components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    PingOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PingOutputBody.json
          format: uri
          readOnly: true
          type: string
        message:
          description: 항상 pong
          examples:
            - pong
          type: string
      required:
        - message
      type: object
    PostRoomOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PostRoomOutputBody.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: 초대 코드 만료 시각
          format: date-time
          type: string
        serial_number:
          description: 방 초대 시리얼 코드
          type: string
      required:
        - serial_number
        - expires_at
      type: object
info:
  title: Co-Browsing Session Server
  version: 1.0.0
openapi: 3.1.0
paths:
  /ping:
    get:
      description: 서버가 살아있는지 확인합니다.
      operationId: ping
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: 헬스 체크
      tags:
        - system
  /rooms:
    post:
      description: 새 RoomSession과 초대 코드를 발급합니다.
      operationId: createRoom
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostRoomOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: 새 방 생성
      tags:
        - rooms
