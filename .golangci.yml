version: "2"

linters:
  default: standard
  enable:
    - depguard
  settings:
    depguard:
      rules:
        # internal/domain: м–ҙл–Ө мҷёл¶Җ л Ҳмқҙм–ҙлҸ„ import кёҲм§Җ (к°ҖмһҘ м•ҲмӘҪ)
        domain:
          list-mode: lax
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: co-browsing-session-server/internal/services
              desc: "domainмқҖ servicesм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/interfaces
              desc: "domainмқҖ interfacesм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/infrastructure
              desc: "domainмқҖ infrastructureм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/app
              desc: "domainмқҖ appм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"

        # internal/services: domainл§Ң мқҳмЎҙ н—Ҳмҡ©
        services:
          list-mode: lax
          files:
            - "**/internal/services/**/*.go"
          deny:
            - pkg: co-browsing-session-server/internal/interfaces
              desc: "servicesлҠ” interfacesм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/infrastructure
              desc: "servicesлҠ” infrastructure кө¬нҳ„м—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ (нҸ¬нҠёл§Ң мӮ¬мҡ©)"
            - pkg: co-browsing-session-server/internal/app
              desc: "servicesлҠ” appм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"

        # internal/interfaces: services + domainл§Ң мқҳмЎҙ н—Ҳмҡ©
        interfaces:
          list-mode: lax
          files:
            - "**/internal/interfaces/**/*.go"
          deny:
            - pkg: co-browsing-session-server/internal/infrastructure
              desc: "interfacesлҠ” infrastructure кө¬нҳ„м—җ м§Ғм ‘ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ (services кІҪмң )"
            - pkg: co-browsing-session-server/internal/app
              desc: "interfacesлҠ” appм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"

        # internal/infrastructure: domainл§Ң мқҳмЎҙ н—Ҳмҡ© (нҸ¬нҠё кө¬нҳ„)
        infrastructure:
          list-mode: lax
          files:
            - "**/internal/infrastructure/**/*.go"
          deny:
            - pkg: co-browsing-session-server/internal/services
              desc: "infrastructureлҠ” servicesм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/interfaces
              desc: "infrastructureлҠ” interfacesм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
            - pkg: co-browsing-session-server/internal/app
              desc: "infrastructureлҠ” appм—җ мқҳмЎҙн•  мҲҳ м—ҶлӢӨ"
        # мЈј: internal/app(м»ҙнҸ¬м§Җм…ҳ лЈЁнҠё)лҠ” лӘЁл“  л Ҳмқҙм–ҙлҘј import к°ҖлҠҘн•ҳлҜҖлЎң к·ңм№ҷ м—ҶмқҢ
